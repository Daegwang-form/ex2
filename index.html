<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027 신입생 합격자 조회 🎈</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-purple: #9c88ff;
            --soft-pink: #ffdae0;
            --pass-color: #fbc531;
            --fail-color: #dcdde1;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Nanum Square Round', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white; width: 90%; max-width: 420px;
            padding: 40px 25px; border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { color: var(--main-purple); font-weight: 800; font-size: 1.6rem; margin-bottom: 5px; }
        .sub-title { font-size: 0.9rem; color: #888; margin-bottom: 30px; }

        .input-box { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.85rem; font-weight: 700; color: #555; margin-left: 10px; }
        
        input {
            width: 100%; padding: 16px; margin-top: 5px;
            border: 2px solid #f0f0f0; border-radius: 20px;
            box-sizing: border-box; font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { border-color: var(--main-purple); outline: none; background: #fafaff; }

        button {
            width: 100%; padding: 18px; margin-top: 10px;
            background: var(--main-purple); color: white;
            border: none; border-radius: 20px;
            font-size: 1.1rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 8px 15px rgba(156, 136, 255, 0.3);
        }

        /* 결과 화면 디자인 */
        #result-section { display: none; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .result-card { padding: 30px 20px; border-radius: 30px; }
        .pass-card { background: #fffdf2; border: 3px solid var(--pass-color); }
        .fail-card { background: #f9f9f9; border: 3px solid #eee; }
        
        .emoji { font-size: 4.5rem; margin-bottom: 15px; }
        .main-msg { font-size: 1.4rem; font-weight: 800; margin-bottom: 10px; }
        .dept-box { 
            display: inline-block; padding: 8px 20px; 
            background: #44bd32; color: white; 
            border-radius: 50px; font-weight: 700; margin: 15px 0;
        }

        @keyframes pop { from { opacity:0; transform: scale(0.8); } to { opacity:1; transform: scale(1); } }
        .loading { display: none; color: #9c88ff; font-weight: 700; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h1>Welcome! 🏫</h1>
        <p class="sub-title">2027 신입생 합격 조회를 시작합니다</p>
        
        <div class="input-box">
            <label>성명</label>
            <input type="text" id="userName" placeholder="이름을 입력해줘">
        </div>
        <div class="input-box">
            <label>생년월일 (6자리)</label>
            <input type="number" id="userBirth" placeholder="예: 110520">
        </div>
        
        <button onclick="checkPass()">결과 확인하기 🚀</button>
        <div id="loader" class="loading">정보를 불러오는 중... ✨</div>
    </div>

    <div id="result-section"></div>
</div>

<script>
    // ⚠️ 여기에 구글 앱스 스크립트에서 배포한 URL을 붙여넣으세요!
    const SCRIPT_URL = "여기에_웹_앱_URL을_복사하세요";

    async function checkPass() {
        const name = document.getElementById('userName').value.trim();
        const birth = document.getElementById('userBirth').value.trim();
        const loader = document.getElementById('loader');

        if(!name || !birth) return alert("정보를 모두 입력해줘! 😊");

        loader.style.display = "block";

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ name, birth })
            });
            const data = await response.json();
            
            displayResult(data, name);
        } catch (error) {
            alert("서버 연결에 실패했어. 다시 시도해줘!");
        } finally {
            loader.style.display = "none";
        }
    }

    function displayResult(data, name) {
        const resDiv = document.getElementById('result-section');
        const loginDiv = document.getElementById('login-section');
        
        loginDiv.style.display = "none";
        resDiv.style.display = "block";

        if(data.status === "success") {
            if(data.pass) {
                resDiv.innerHTML = `
                    <div class="result-card pass-card">
                        <div class="emoji">🎊</div>
                        <div class="main-msg">축하해, ${name}아!</div>
                        <p>너의 노력이 빛을 발했어!<br>우리 학교의 일원이 된 걸 환영해.</p>
                        <div class="dept-box">${data.dept} 합격</div>
                        <p style="font-size:0.85rem; color:#888;">멋진 학교 생활을 함께 그리자! 🌈</p>
                        <button onclick="location.reload()" style="background:#fbc531; margin-top:20px;">확인 완료</button>
                    </div>`;
            } else {
                resDiv.innerHTML = `
                    <div class="result-card fail-card">
                        <div class="emoji">🌱</div>
                        <div class="main-msg">고생 많았어, ${name}아.</div>
                        <p>이번 결과가 너의 전부는 아니야.<br>더 넓은 세상이 너를 기다리고 있을 거야.</p>
                        <p style="color:#0097e6; font-weight:700;">너의 꿈을 언제나 응원할게!</p>
                        <button onclick="location.reload()" style="background:#718093; margin-top:20px;">돌아가기</button>
                    </div>`;
            }
        } else {
            resDiv.innerHTML = `
                <div class="emoji">🔍</div>
                <h3>정보가 없어요!</h3>
                <p>이름이나 생년월일이 틀린 것 같아.<br>다시 한번 확인해줄래?</p>
                <button onclick="location.reload()" style="background:#718093;">다시 입력하기</button>`;
        }
    }
</script>

</body>
</html>
