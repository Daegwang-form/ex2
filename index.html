<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대광고 중학생 진로체험 신청</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-deep: #1a4d2e;
      --green-mid: #2d7a4f;
      --green-bright: #3aab68;
      --green-light: #e8f5ee;
      --green-pale: #f4fbf7;
      --gold: #c9a84c;
      --text-dark: #1c2b22;
      --text-mid: #4a6358;
      --text-light: #8aab98;
      --white: #ffffff;
    }

    body {
      min-height: 100vh;
      background: var(--green-pale);
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -120px; left: -120px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(58,171,104,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; right: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(26,77,46,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--white);
      border-radius: 24px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(26,77,46,0.10);
      overflow: hidden;
      animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      background: linear-gradient(145deg, var(--green-deep) 0%, var(--green-mid) 100%);
      padding: 40px 36px 36px;
      position: relative;
    }

    .school-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px;
      padding: 8px 18px;
      margin-bottom: 20px;
    }
    .school-badge span {
      font-size: 14px;
      font-weight: 600;
      color: white;
    }
    .school-badge-dot {
      width: 8px; height: 8px;
      background: var(--green-bright);
      border-radius: 50%;
    }

    .card-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--white);
    }
    .card-title em { font-style: normal; color: #7de8a8; }
    .card-subtitle { margin-top: 8px; font-size: 13px; color: rgba(255,255,255,0.6); }
