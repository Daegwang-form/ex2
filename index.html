<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027 신입생 합격자 조회 🎈</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-purple: #9c88ff;
            --pass-green: #44bd32;
            --confirm-yellow: #ffc233;
            --bg-blue: #8faefc;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Nanum Square Round', sans-serif;
            background-color: var(--bg-blue);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #f8faff;
            width: 90%; max-width: 420px;
            padding: 50px 30px; border-radius: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
        }

        h1 { color: var(--main-purple); font-weight: 800; margin-bottom: 30px; font-size: 1.8rem; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.9rem; font-weight: 700; color: #666; margin-left: 10px; }
        input {
            width: 100%; padding: 18px; margin-top: 8px;
            border: 2px solid #eee; border-radius: 25px;
            box-sizing: border-box; font-size: 1rem; outline: none;
        }
        input:focus { border-color: var(--main-purple); }

        .btn {
            width: 100%; padding: 20px; border: none; border-radius: 25px;
            font-size: 1.2rem; font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .check-btn { background: var(--main-purple); color: white; margin-top: 10px; }
        .confirm-btn { background: var(--confirm-yellow); color: white; margin-top: 30px; box-shadow: 0 5px 15px rgba(255,194,51,0.3); }

        #result-section { display: none; animation: fadeIn 0.5s; }
        .emoji-img { width: 100px; margin-bottom: 10px; }
        .status-msg { font-size: 1.6rem; font-weight: 800; color: #333; margin: 15px 0; }
        .dept-badge {
            display: inline-block; padding: 12px 35px;
            background: var(--pass-green); color: white;
            border-radius: 50px; font-weight: 700; font-size: 1.2rem;
        }
        .info-text { color: #888; font-size: 0.9rem; margin-top: 25px; line-height: 1.5; }
        .loading { display: none; color: var(--main-purple); font-weight: 700; margin-top: 15px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h1>합격자 조회</h1>
        <div class="input-group">
            <label>이름</label>
            <input type="text" id="userName" placeholder="이름을 입력하세요">
        </div>
        <div class="input-group">
            <label>생년월일 (8자리)</label>
            <input type="number" id="userBirth" placeholder="예: 20110520" oninput="if(this.value.length > 8) this.value = this.value.slice(0, 8);">
        </div>
        <button class="btn check-btn" onclick="checkPass()">결과 확인하기 🚀</button>
        <div id="loader" class="loading">데이터 조회 중... ✨</div>
    </div>

    <div id="result-section">
        <div id="result-content"></div>
        <button class="btn confirm-btn" onclick="location.reload()">확인 완료</button>
    </div>
</div>

<script>
    // 전달해주신 배포 URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw84oSwrAKNJaOjJvNNQyI4yDO0IXJefmlGglICabqD7kjsxVVEZsUVp5PCcnItJ-7VjQ/exec";

    async function checkPass() {
        const name = document.getElementById('userName').value.trim();
        const birth = document.getElementById('userBirth').value.trim();
        const loader = document.getElementById('loader');

        if(!name || birth.length !== 8) {
            alert("이름과 생년월일 8자리를 입력해주세요! 😊");
            return;
        }

        loader.style.display = "block";

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ name, birth })
            });
            const data = await response.json();
            displayResult(data, name);
        } catch (error) {
            alert("연결 오류가 발생했습니다. 다시 시도해주세요.");
        } finally {
            loader.style.display = "none";
        }
    }

    function displayResult(data, name) {
        const resSection = document.getElementById('result-section');
        const loginSection = document.getElementById('login-section');
        const content = document.getElementById('result-content');
        
        loginSection.style.display = "none";
        resSection.style.display = "block";

        if(data.status === "success") {
            if(data.pass === true) {
                // 시트 C열이 'pass'인 경우
                content.innerHTML = `
                    <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f389/512.gif" class="emoji-img">
                    <div class="status-msg">합격을 축하합니다!</div>
                    <div class="dept-badge">${data.dept} 합격</div>
                    <div class="info-text">합격자 소집일 : 2027.12.11.(금) 14:00</div>
                `;
            } else {
                // 시트 C열이 'fail'인 경우
                content.innerHTML = `
                    <div style="font-size: 5rem; margin-bottom:15px;">🌱</div>
                    <div class="status-msg">${name}님, 수고하셨습니다.</div>
                    <p style="line-height:1.6; color:#666;">
                        아쉽게도 이번 전형에서는 선발되지 않았습니다.<br>
                        더 밝게 빛날 귀하의 앞날을<br>진심으로 응원하겠습니다.
                    </p>
                `;
            }
        } else {
            // 명단에 없는 경우
            content.innerHTML = `
                <div style="font-size: 4rem; margin-bottom:15px;">🔍</div>
                <div class="status-msg">정보를 찾을 수 없습니다</div>
                <p style="color:#888;">이름과 생년월일을 다시 확인해주세요.</p>
            `;
        }
    }
</script>

</body>
</html>
