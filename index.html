<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027 신입생 합격자 조회 🎈</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-purple: #9c88ff;
            --pass-gold: #fbc531;
            --soft-blue: #74b9ff;
            --text-dark: #2f3640;
            --fail-grey: #a4b0be;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Nanum Square Round', sans-serif;
            background: linear-gradient(135deg, #a29bfe 0%, #74b9ff 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--text-dark);
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            width: 90%; max-width: 400px;
            padding: 50px 30px; border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 { color: var(--main-purple); font-weight: 800; font-size: 1.7rem; margin-bottom: 10px; }
        .sub-title { font-size: 0.95rem; color: #7f8c8d; margin-bottom: 35px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.9rem; font-weight: 700; color: #636e72; margin-left: 8px; }
        
        input {
            width: 100%; padding: 16px; margin-top: 8px;
            border: 2px solid #eee; border-radius: 20px;
            box-sizing: border-box; font-size: 1rem;
            transition: all 0.3s; background: #f9f9f9;
        }

        input:focus { border-color: var(--main-purple); outline: none; background: #fff; box-shadow: 0 0 10px rgba(156, 136, 255, 0.2); }

        button {
            width: 100%; padding: 18px; margin-top: 15px;
            background: var(--main-purple); color: white;
            border: none; border-radius: 20px;
            font-size: 1.15rem; font-weight: 800; cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(156, 136, 255, 0.3);
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(156, 136, 255, 0.4); }

        #result-section { display: none; animation: slideUp 0.5s ease-out; }
        .result-card { padding: 10px; border-radius: 30px; }
        .emoji { font-size: 5rem; margin-bottom: 20px; display: block; }
        
        .dept-tag {
            display: inline-block; padding: 10px 25px;
            background: linear-gradient(to right, #44bd32, #26de81);
            color: white; border-radius: 50px;
            font-weight: 800; font-size: 1.1rem; margin: 20px 0;
        }

        .loading { display: none; margin-top: 20px; font-weight: 700; color: var(--main-purple); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h1>Hello, 2027! 🏫</h1>
        <p class="sub-title">설레는 합격의 순간을 확인해보세요</p>
        
        <div class="input-group">
            <label>이름</label>
            <input type="text" id="userName" placeholder="이름을 입력해주세요">
        </div>
        <div class="input-group">
            <label>생년월일 (8자리)</label>
            <input type="number" id="userBirth" placeholder="예: 20110101" oninput="if(this.value.length > 8) this.value = this.value.slice(0, 8);">
        </div>
        
        <button onclick="checkPass()">결과 확인하기 🚀</button>
        <div id="loader" class="loading">정보를 확인하고 있어... ✨</div>
    </div>

    <div id="result-section"></div>
</div>

<script>
    // 배포하신 Google Apps Script URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw84oSwrAKNJaOjJvNNQyI4yDO0IXJefmlGglICabqD7kjsxVVEZsUVp5PCcnItJ-7VjQ/exec";

    async function checkPass() {
        const name = document.getElementById('userName').value.trim();
        const birth = document.getElementById('userBirth').value.trim();
        const loader = document.getElementById('loader');

        if(!name || birth.length !== 8) {
            alert("이름과 생년월일 8자리를 정확히 입력해줘! 😊");
            return;
        }

        loader.style.display = "block";

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ name, birth })
            });
            const data = await response.json();
            displayResult(data, name);
        } catch (error) {
            alert("서버 연결에 문제가 생겼어. 다시 시도해줘!");
        } finally {
            loader.style.display = "none";
        }
    }

    function displayResult(data, name) {
        const resSection = document.getElementById('result-section');
        const loginSection = document.getElementById('login-section');
        
        loginSection.style.display = "none";
        resSection.style.display = "block";

        if(data.status === "success") {
            // DB의 C열이 '합격'인 경우
            if(data.pass) {
                resSection.innerHTML = `
                    <div class="result-card">
                        <span class="emoji">🎉</span>
                        <h2 style="font-weight:800; margin-bottom:5px;">축하해, ${name}아!</h2>
                        <p style="line-height:1.6;">너의 소중한 노력이 결실을 맺었어.<br>우리 학교의 주인공이 된 걸 환영해!</p>
                        <div class="dept-tag">${data.dept} 합격</div>
                        <p style="font-size:0.85rem; color:#888;">입학 관련 공지를 꼭 확인해줘!</p>
                        <button onclick="location.reload()" style="background:var(--pass-gold); margin-top:25px;">확인 완료</button>
                    </div>`;
            } 
            // DB의 C열이 '불합격'인 경우
            else {
                resSection.innerHTML = `
                    <div class="result-card">
                        <span class="emoji">🌱</span>
                        <h2 style="font-weight:800; margin-bottom:5px;">수고했어, ${name}아.</h2>
                        <p style="line-height:1.6;">이번 결과가 너의 전부는 아니야.<br>더 밝게 빛날 너의 미래를 항상 응원할게.</p>
                        <p style="color:var(--soft-blue); font-weight:700; margin-top:15px;">너는 충분히 멋진 사람이야!</p>
                        <button onclick="location.reload()" style="background:var(--fail-grey); margin-top:25px;">돌아가기</button>
                    </div>`;
            }
        } else {
            resSection.innerHTML = `
                <span class="emoji">🔍</span>
                <h2 style="font-weight:800;">정보를 찾을 수 없어</h2>
                <p>입력한 이름과 생년월일 8자리가<br>명단과 일치하는지 확인해줄래?</p>
                <button onclick="location.reload()" style="background:var(--fail-grey); margin-top:20px;">다시 입력하기</button>`;
        }
    }
</script>

</body>
</html>
